<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prayer Times</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="prayer-widget">

  <div class="prayers">

    <div class="prayer">
      <div class="icon">🌅</div>
      <div class="name">Fajr</div>
      <div class="time" id="fajr">--:--</div>
    </div>

    <div class="prayer">
      <div class="icon">☀️</div>
      <div class="name">Sunrise</div>
      <div class="time" id="sunrise">--:--</div>
    </div>

    <div class="prayer">
      <div class="icon">☀️</div>
      <div class="name">Dhuhr</div>
      <div class="time" id="dhuhr">--:--</div>
    </div>

    <div class="prayer">
      <div class="icon">🌤️</div>
      <div class="name">Asr</div>
      <div class="time" id="asr">--:--</div>
    </div>

    <div class="prayer">
      <div class="icon">🌇</div>
      <div class="name">Maghrib</div>
      <div class="time" id="maghrib">--:--</div>
    </div>

    <div class="prayer">
      <div class="icon">🌙</div>
      <div class="name">Isha</div>
      <div class="time" id="isha">--:--</div>
    </div>

  </div>

  <div class="qibla">
    🧭 Qibla: <strong>118° from North</strong> (South-East ↗)
  </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/adhan@4.4.3/dist/Adhan.min.js"></script>
<script src="script.js"></script>

</body>
</html>
